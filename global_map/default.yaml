  - {key: lower-shared-wall, left: 4, top: 63, width: 92, height: 6}
  - {key: west-shared-wall, left: 31, top: 6, width: 6, height: 88}
  - {key: east-shared-wall, left: 61, top: 6, width: 6, height: 88}
