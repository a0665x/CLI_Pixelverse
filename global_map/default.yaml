version: 1
key: default-office
name: CLI Pixelverse Default Office
image: /global_map/default.png
description: Default auditable global map. Rooms, doors, corridors, states, and furniture semantics are all data-driven from this file.
bounds: {left: 2, top: 2, width: 96, height: 96}
corridors:
