    center: {x: 19, y: 20}
    portal: {x: 19, y: 37}
    aisle: {x: 19, y: 30}
    hub: {x: 19, y: 34}
    patrol: [{x: 12, y: 15}, {x: 26, y: 16}, {x: 19, y: 25}]
