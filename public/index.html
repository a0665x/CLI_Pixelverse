<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hermes Pixelverse</title>
  <style>
    :root {
      --bg: #08111f;
      --bg2: #10203a;
      --panel: rgba(7, 14, 26, 0.92);
      --panel-soft: rgba(12, 23, 43, 0.86);
      --line: #294670;
      --line-2: #4a74ae;
      --text: #edf4ff;
      --muted: #abc0df;
      --cyan: #6ee7f9;
      --blue: #60a5fa;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #ef4444;
      --purple: #a78bfa;
      --pink: #f472b6;
      --shadow: rgba(0, 0, 0, 0.35);
      --ui-font: "Noto Sans TC", system-ui, sans-serif;
      --caps-font: "Press Start 2P", "Noto Sans TC", monospace;
      --base-size: 11px;
    }
    body[data-locale="en-US"] {
      --ui-font: "Press Start 2P", monospace;
      --caps-font: "Press Start 2P", monospace;
      --base-size: 9px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(110, 231, 249, 0.15), transparent 38%),
        linear-gradient(180deg, #050913 0%, #0c1426 48%, #09111f 100%);
      color: var(--text);
      font-family: var(--ui-font);
      font-size: var(--base-size);
    }
    button { font: inherit; }
    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    .world {
      position: absolute;
      inset: 0;
      overflow: hidden;
      cursor: grab;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(180deg, rgba(96,165,250,0.12), transparent 22%),
        linear-gradient(180deg, #12203a 0%, #10192e 48%, #0b1324 100%);
      background-size: 32px 32px, 32px 32px, 100% 100%, 100% 100%;
    }
    .world.panning { cursor: grabbing; }
    .world::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 10%, rgba(251,191,36,0.16), transparent 24%),
        radial-gradient(circle at 80% 16%, rgba(167,139,250,0.14), transparent 22%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0 12px, transparent 12px 24px);
      opacity: 0.7;
      pointer-events: none;
    }
    .camera-stage {
      position: absolute;
      left: 0;
      top: 0;
      width: 1600px;
      height: 1040px;
      transform: translate3d(var(--camera-x, 0px), var(--camera-y, 0px), 0) scale(var(--camera-scale, 1));
      transition: transform .18s ease-out;
      transform-origin: top left;
      will-change: transform;
    }
    .camera-stage.is-panning { transition: none; }
    .house-shell {
      position: absolute;
      inset: 44px 52px 58px 52px;
      pointer-events: none;
      z-index: 1;
    }
    .house-boundary {
      position: absolute;
      inset: 2%;
      border-radius: 16px;
      border: 8px solid #2e2530;
      background: #151521;
      box-shadow: inset 0 0 0 6px rgba(255,255,255,0.04), 0 18px 32px rgba(0,0,0,0.34);
    }
    .office-shell {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .house-corridor {
      position: absolute;
      border: 4px solid #2e2530;
      border-radius: 8px;
      background-color: #cdbf91;
      background-image:
        linear-gradient(90deg, rgba(60,48,42,0.06) 1px, transparent 1px),
        linear-gradient(rgba(60,48,42,0.05) 1px, transparent 1px);
      background-repeat: repeat;
      background-size: 48px 48px;
      image-rendering: pixelated;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.08), 0 8px 18px rgba(0,0,0,0.2);
    }
    .corridor-main { left: 6%; right: 6%; top: 44%; height: 12%; border-radius: 0; }
    .corridor-vertical { display: none; }
    .window-strip {
      position: absolute;
      top: 5%;
      left: 8%;
      right: 8%;
      display: flex;
      justify-content: space-between;
      opacity: 0.75;
    }
    .window-strip span {
      width: 12%;
      height: 32px;
      border: 3px solid rgba(191,219,254,0.2);
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(125,211,252,0.88), rgba(56,189,248,0.28)),
        linear-gradient(90deg, rgba(255,255,255,0.16) 0 2px, transparent 2px 50%),
        linear-gradient(rgba(255,255,255,0.16) 0 2px, transparent 2px 50%);
      background-size: 100% 100%, 50% 100%, 100% 50%;
    }
    .wing-marker {
      position: absolute;
      padding: 6px 10px;
      border-radius: 999px;
      border: 2px solid rgba(190,215,255,0.18);
      background: rgba(9, 16, 30, 0.78);
      color: #dbeafe;
      box-shadow: 0 6px 0 rgba(0,0,0,0.22);
      letter-spacing: 0.02em;
    }
    .wing-marker.left { left: 10%; top: 10%; }
    .wing-marker.right { right: 8%; top: 10%; }
    .room-door {
      position: absolute;
      border-radius: 2px;
      background: #7c4a25;
      background-repeat: no-repeat;
      background-position: center;
      background-size: 100% 100%;
      image-rendering: pixelated;
      box-shadow: 0 0 0 2px rgba(32,24,25,0.75);
      z-index: 3;
      pointer-events: none;
      transform-origin: left center;
      transition: transform .18s ease, background-color .18s ease, opacity .18s ease;
    }
    .room-door[data-side="top"],
    .room-door[data-side="bottom"] {
      height: 7px !important;
    }
    .room-door.open[data-side="top"],
    .room-door.open[data-side="bottom"] {
      background: #b97437;
      transform: rotate(-68deg);
      opacity: .92;
    }
    .hud {
      position: absolute;
      inset: 12px 12px auto 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      z-index: 30;
      pointer-events: none;
    }
    .hud > * { pointer-events: auto; }
    .panel {
      background: var(--panel);
      border: 3px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 0 0 4px rgba(3, 7, 14, 0.92), 0 14px 30px var(--shadow);
      pointer-events: auto;
      touch-action: none;
    }
    .panel.dragging { opacity: 0.96; box-shadow: 0 0 0 4px rgba(3, 7, 14, 0.92), 0 22px 42px rgba(0,0,0,0.46); }
    [data-drag-handle] {
      cursor: grab;
      user-select: none;
      touch-action: none;
    }
    .brand {
      padding: 14px 16px;
      width: min(540px, calc(100vw - 360px));
      display: grid;
      gap: 10px;
    }
    .brand-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .title {
      font-family: var(--caps-font);
      font-size: 18px;
      line-height: 1.3;
      color: #f8fbff;
      text-shadow: 0 0 10px rgba(110,231,249,0.24);
    }
    body[data-locale="en-US"] .title { font-size: 15px; }
    .subtitle, .muted, .district-subtitle, .prop-label {
      color: var(--muted);
      line-height: 1.55;
    }
    .top-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      align-items: center;
      min-width: 240px;
    }
    .lang-switch {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding: 6px;
    }
    .lang-switch button {
      border: 2px solid var(--line-2);
      background: rgba(10, 18, 34, 0.82);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 10px;
      cursor: pointer;
    }
    .lang-switch button.active {
      background: rgba(96,165,250,0.22);
      color: #fff;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.16);
    }
    .summary-strip {
      min-width: 300px;
      padding: 12px 14px;
      display: grid;
      gap: 8px;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .summary-card {
      padding: 10px;
      border-radius: 10px;
      background: var(--panel-soft);
      border: 2px solid var(--line-2);
      line-height: 1.5;
    }
    .strong { color: #fff; font-size: 1.05em; }

    .district {
      position: absolute;
      border: 4px solid #2e2530;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.1), 0 10px 18px rgba(0,0,0,0.2);
      background-color: var(--district-floor-color, #d4c196);
      background-image:
        radial-gradient(ellipse at 50% 66%, var(--district-rug-color, rgba(102,75,48,0.14)) 0 22%, transparent 23%),
        linear-gradient(180deg, var(--district-accent-color, rgba(255,255,255,0.04)), transparent 34%);
      background-repeat: no-repeat, no-repeat;
      background-position: 0 0, center;
      background-size: 100% 100%, 100% 100%;
    }
    .district::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), transparent 22%);
      opacity: 0.28;
      pointer-events: none;
    }
    .district::after {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 28px;
      background-image: var(--district-wall-tile, none);
      background-repeat: repeat-x;
      background-size: var(--district-wall-size, 64px 64px);
      opacity: 0.95;
      pointer-events: none;
    }
    .district[data-room="think_lab"] { left: 7%; top: 12%; width: 23%; height: 24%; }
    .district[data-room="blueprint_lab"] { left: 32%; top: 11%; width: 25%; height: 28%; }
    .district[data-room="clone_bay"] { left: 69%; top: 11%; width: 24%; height: 29%; }
    .district[data-room="standby_dock"] { left: 7%; top: 58%; width: 23%; height: 23%; }
    .district[data-room="response_studio"] { left: 32%; top: 58%; width: 22%; height: 23%; }
    .district[data-room="tool_forge"] { left: 56%; top: 58%; width: 20%; height: 23%; }
    .district[data-room="session_archive"] { left: 77%; top: 58%; width: 16%; height: 23%; }

    .district-label {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 6;
      padding: 7px 10px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.14);
      background: rgba(7, 13, 24, 0.9);
      display: inline-flex;
      gap: 8px;
      align-items: center;
      max-width: calc(100% - 20px);
    }
    .district-label strong {
      color: #fff;
      font-size: 0.95em;
    }
    .district-floor-accents,
    .district-semantics,
    .district-walls,
    .district-props {
      position: absolute;
      inset: 0;
    }
    .district-floor-accents,
    .district-semantics,
    .district-walls { display: none; }
    .district-floor-accents { z-index: 1; }
    .district-semantics { z-index: 2; }
    .district-walls { z-index: 3; pointer-events: none; }
    .district-props { z-index: 4; }
    .tile-accent,
    .semantic-zone,
    .wall-segment {
      position: absolute;
      border-radius: 10px;
      background-image: var(--tile-url);
      background-repeat: repeat;
      background-size: 18px 18px;
      image-rendering: pixelated;
      opacity: var(--tile-opacity, 0.65);
    }
    .tile-accent {
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.05);
      mix-blend-mode: screen;
    }
    .semantic-zone {
      display: grid;
      align-items: end;
      padding: 4px;
      border: 2px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 0 0 2px rgba(8, 15, 28, 0.22), 0 6px 12px rgba(0,0,0,0.14);
      overflow: hidden;
    }
    .semantic-zone::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), transparent 42%);
      pointer-events: none;
    }
    .semantic-zone.focus,
    .semantic-zone.plan,
    .semantic-zone.briefing,
    .semantic-zone.scan {
      box-shadow: inset 0 0 0 2px rgba(110,231,249,0.18), 0 6px 12px rgba(0,0,0,0.14);
    }
    .semantic-zone.work,
    .semantic-zone.craft,
    .semantic-zone.terminal,
    .semantic-zone.server,
    .semantic-zone.storage,
    .semantic-zone.dispatch {
      box-shadow: inset 0 0 0 2px rgba(74,222,128,0.18), 0 6px 12px rgba(0,0,0,0.14);
    }
    .semantic-zone.rest,
    .semantic-zone.break {
      box-shadow: inset 0 0 0 2px rgba(96,165,250,0.18), 0 6px 12px rgba(0,0,0,0.14);
    }
    .semantic-zone.archive,
    .semantic-zone.reference,
    .semantic-zone.review,
    .semantic-zone.portal {
      box-shadow: inset 0 0 0 2px rgba(167,139,250,0.18), 0 6px 12px rgba(0,0,0,0.14);
    }
    .semantic-zone-label {
      position: relative;
      z-index: 1;
      justify-self: start;
      max-width: 100%;
      font-size: 8px;
      color: #f8fbff;
      padding: 2px 5px;
      border-radius: 999px;
      background: rgba(8, 15, 28, 0.78);
      border: 1px solid rgba(255,255,255,0.12);
      opacity: 0;
      transform: translateY(2px);
      transition: opacity .12s ease, transform .12s ease;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }
    .semantic-zone:hover .semantic-zone-label {
      opacity: 1;
      transform: translateY(0);
    }
    .wall-segment {
      border-radius: 8px;
      box-shadow: inset 0 0 0 2px rgba(8,15,28,0.24), 0 5px 0 rgba(0,0,0,0.18);
      filter: saturate(0.9) brightness(0.96);
    }
    .prop {
      position: absolute;
      width: 74px;
      display: grid;
      justify-items: center;
      gap: 4px;
      transform: translate(-50%, -50%);
      pointer-events: auto;
      --prop-scale: 1;
    }
    .prop-icon {
      position: absolute;
      left: 50%;
      top: -18px;
      min-width: 28px;
      height: 24px;
      padding: 0 5px;
      transform: translateX(-50%);
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(6, 11, 22, 0.9);
      box-shadow: 0 4px 0 rgba(0,0,0,0.26);
      font-size: 15px;
      line-height: 1;
      z-index: 2;
    }
    .prop img {
      width: calc(48px * var(--prop-width-tiles, 1) * var(--prop-scale));
      height: calc(48px * var(--prop-height-tiles, 1) * var(--prop-scale));
      image-rendering: pixelated;
      filter: drop-shadow(0 5px 0 rgba(0,0,0,0.25));
    }
    .prop[data-asset-pack="office-fallback"][data-prop-type="bed"] { --prop-scale: 1.8 !important; }
    .prop[data-asset-pack="office-fallback"][data-prop-type="sofa"] { --prop-scale: 1.58 !important; }
    .prop[data-asset-pack="office-fallback"][data-prop-type="desk"],
    .prop[data-asset-pack="office-fallback"][data-prop-type="table"],
    .prop[data-asset-pack="office-fallback"][data-prop-type="workbench"] { --prop-scale: 1.45 !important; }
    .prop[data-asset-pack="office-fallback"][data-prop-type="chair"] { --prop-scale: 1.3 !important; }
    .prop[data-asset-pack="office-fallback"][data-prop-type="bookshelf"],
    .prop[data-asset-pack="office-fallback"][data-prop-type="cabinet"],
    .prop[data-asset-pack="office-fallback"][data-prop-type="locker"],
    .prop[data-asset-pack="office-fallback"][data-prop-type="server"] { --prop-scale: 1.5 !important; }
    .prop[data-asset-pack="office-fallback"][data-prop-type="board"] { --prop-scale: 1.58 !important; }
    .prop img[data-pack="kenney"],
    .prop img[data-pack="appledog"],
    .prop img[data-pack="office-fallback"] {
      filter: drop-shadow(0 6px 0 rgba(0,0,0,0.28));
    }
    .prop img[data-pack="appledog"] { border-radius: 4px; }
    .prop img[data-pack="office-fallback"] { border-radius: 5px; }
    .prop-label {
      font-size: 9px;
      text-align: center;
      padding: 2px 4px;
      border-radius: 999px;
      background: rgba(5, 10, 18, 0.74);
      max-width: 88px;
      word-break: break-word;
      opacity: 0;
      transform: translateY(-2px);
      transition: opacity .12s ease, transform .12s ease;
    }
    .prop:hover .prop-label {
      opacity: 1;
      transform: translateY(0);
    }
    .prop.prop-fx-pulse img { animation: propPulse 1.4s ease-in-out infinite; }
    .prop.prop-fx-pulse-soft img { animation: propPulseSoft 2.1s ease-in-out infinite; }
    .prop.prop-fx-flicker img { animation: propFlicker 1.25s steps(2) infinite; }
    .prop.prop-fx-terminal img { animation: propTerminal 1.1s linear infinite; }
    .prop.prop-fx-coffee img { animation: propCoffee 2.4s ease-in-out infinite; }
    .prop.prop-fx-glow img { animation: propGlow 2.8s ease-in-out infinite; }
    .prop.prop-fx-shimmer img { animation: propShimmer 2.2s linear infinite; }
    .semantic-zone.zone-fx-scan { animation: zoneScan 1.8s linear infinite; }
    .semantic-zone.zone-fx-terminal { animation: zoneTerminal 1.4s ease-in-out infinite; }
    .semantic-zone.zone-fx-flicker { animation: zoneFlicker 1.6s steps(2) infinite; }
    .semantic-zone.zone-fx-pulse { animation: zonePulse 1.4s ease-in-out infinite; }
    .semantic-zone.zone-fx-rest { animation: zoneRest 2.8s ease-in-out infinite; }
    .semantic-zone.zone-fx-plan { animation: zonePlan 1.8s ease-in-out infinite; }
    .semantic-zone.zone-fx-craft { animation: zoneCraft 1.2s ease-in-out infinite; }
    @keyframes propPulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 6px 0 rgba(0,0,0,0.28)); }
      50% { transform: scale(1.08); filter: drop-shadow(0 6px 0 rgba(0,0,0,0.28)) drop-shadow(0 0 10px rgba(167,139,250,0.5)); }
    }
    @keyframes propPulseSoft {
      0%, 100% { transform: scale(1); opacity: 0.86; }
      50% { transform: scale(1.04); opacity: 1; }
    }
    @keyframes propFlicker {
      0%, 100% { opacity: 1; filter: drop-shadow(0 6px 0 rgba(0,0,0,0.28)); }
      50% { opacity: 0.78; filter: drop-shadow(0 6px 0 rgba(0,0,0,0.28)) drop-shadow(0 0 8px rgba(74,222,128,0.45)); }
    }
    @keyframes propTerminal {
      0%, 100% { transform: translateY(0); filter: drop-shadow(0 6px 0 rgba(0,0,0,0.28)); }
      50% { transform: translateY(-1px); filter: drop-shadow(0 6px 0 rgba(0,0,0,0.28)) drop-shadow(0 0 8px rgba(110,231,249,0.4)); }
    }
    @keyframes propCoffee {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-2px) rotate(-2deg); }
    }
    @keyframes propGlow {
      0%, 100% { filter: drop-shadow(0 6px 0 rgba(0,0,0,0.28)); opacity: 0.92; }
      50% { filter: drop-shadow(0 6px 0 rgba(0,0,0,0.28)) drop-shadow(0 0 10px rgba(251,191,36,0.46)); opacity: 1; }
    }
    @keyframes propShimmer {
      0% { transform: translateY(0); opacity: 0.92; }
      50% { transform: translateY(-1px); opacity: 1; }
      100% { transform: translateY(0); opacity: 0.92; }
    }
    @keyframes zoneScan {
      0% { box-shadow: inset 0 0 0 2px rgba(110,231,249,0.2), 0 6px 12px rgba(0,0,0,0.14); }
      50% { box-shadow: inset 0 0 0 2px rgba(110,231,249,0.38), 0 6px 14px rgba(0,0,0,0.2), 0 0 14px rgba(110,231,249,0.18); }
      100% { box-shadow: inset 0 0 0 2px rgba(110,231,249,0.2), 0 6px 12px rgba(0,0,0,0.14); }
    }
    @keyframes zoneTerminal {
      0%, 100% { opacity: var(--tile-opacity, 0.75); }
      50% { opacity: calc(var(--tile-opacity, 0.75) + 0.12); }
    }
    @keyframes zoneFlicker {
      0%, 100% { opacity: var(--tile-opacity, 0.75); }
      50% { opacity: calc(var(--tile-opacity, 0.75) - 0.14); }
    }
    @keyframes zonePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    @keyframes zoneRest {
      0%, 100% { opacity: var(--tile-opacity, 0.75); }
      50% { opacity: calc(var(--tile-opacity, 0.75) + 0.08); }
    }
    @keyframes zonePlan {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1px); }
    }
    @keyframes zoneCraft {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(1px); }
    }
    body[data-locale="en-US"] .prop-label { font-size: 7px; }

    .agents-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
    }
    .path-layer {
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      display: none;
    }
    .path-line {
      fill: none;
      stroke: rgba(110, 231, 249, 0.9);
      stroke-width: 0.55;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 4px rgba(110, 231, 249, 0.28));
      opacity: 0.92;
      animation: pathPulse 1.8s ease-in-out infinite;
    }
    .path-line.planning { stroke: rgba(110, 231, 249, 0.92); }
    .path-line.thinking { stroke: rgba(251, 191, 36, 0.9); }
    .path-line.working { stroke: rgba(74, 222, 128, 0.9); }
    .path-line.offline { stroke: rgba(239, 68, 68, 0.86); }
    @keyframes pathPulse {
      0%, 100% { opacity: 0.78; }
      50% { opacity: 1; }
    }
    .agent {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 124px;
      display: grid;
      justify-items: center;
      gap: 4px;
      cursor: pointer;
      user-select: none;
      transition: transform .12s ease, filter .12s ease, left .7s cubic-bezier(.35, 0, .25, 1), top .7s cubic-bezier(.35, 0, .25, 1);
    }
    .agent:hover, .agent.selected { transform: translate(-50%, -52%); filter: brightness(1.08); }
    .agent.walking .sprite-wrap { animation: travelBob .32s steps(2) infinite; }
    .agent.walking .agent-pixel { animation: walkBounce .34s steps(2) infinite; }
    .agent.thinking .agent-pixel { animation: thinkFloat 1.8s ease-in-out infinite; }
    .agent.planning .agent-pixel { animation: planSway 1.15s ease-in-out infinite; }
    .agent.working .agent-pixel { animation: workBounce .42s steps(2) infinite; }
    .agent.idle .agent-pixel { animation: idleBreath 2.8s ease-in-out infinite; }
    .agent.pose-terminal:not(.walking) .agent-pixel { transform: translateY(-1px) rotate(-2deg); }
    .agent.pose-planning:not(.walking) .agent-pixel,
    .agent.pose-ponder:not(.walking) .agent-pixel { transform: translateY(-2px); }
    .agent.pose-rest:not(.walking) .agent-pixel { transform: translateY(2px) scale(1.02); }
    .agent.pose-dispatch:not(.walking) .agent-pixel { transform: translateY(-1px) rotate(2deg); }
    .agent.pose-writing:not(.walking) .agent-pixel,
    .agent.pose-notes:not(.walking) .agent-pixel { transform: translateY(-1px) rotate(-1deg); }
    @keyframes walkBounce {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
    }
    @keyframes travelBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    @keyframes workBounce {
      0%, 100% { transform: translateY(0px) scaleY(1); }
      50% { transform: translateY(-2px) scaleY(0.98); }
    }
    @keyframes thinkFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }
    @keyframes planSway {
      0%, 100% { transform: translateX(0px); }
      25% { transform: translateX(-2px); }
      75% { transform: translateX(2px); }
    }
    @keyframes idleBreath {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-1px) scale(1.01); }
    }
    .agent-speech {
      min-height: 22px;
      max-width: 176px;
      padding: 6px 8px;
      border-radius: 10px;
      border: 3px solid #15213a;
      background: #f8fbff;
      color: #08111f;
      font-size: 9px;
      line-height: 1.4;
      display: none;
      box-shadow: 0 6px 0 rgba(8,15,28,0.4);
      pointer-events: auto;
    }
    .agent-speech.show { display: block; }
    .agent-speech.clickable, .event-chip.clickable { cursor: pointer; }
    .sprite-wrap {
      position: relative;
      width: 82px;
      height: 86px;
      display: grid;
      place-items: center;
    }
    .beam {
      position: absolute;
      left: 50%;
      bottom: 3px;
      width: 82px;
      height: 22px;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(96,165,250,0.7), rgba(96,165,250,0.12) 70%, transparent 100%);
      filter: blur(1px);
      opacity: .95;
    }
    .beam.thinking { background: radial-gradient(circle, rgba(251,191,36,.75), rgba(251,191,36,.1) 70%, transparent 100%); }
    .beam.planning { background: radial-gradient(circle, rgba(110,231,249,.78), rgba(110,231,249,.12) 70%, transparent 100%); }
    .beam.working { background: radial-gradient(circle, rgba(74,222,128,.76), rgba(74,222,128,.1) 70%, transparent 100%); }
    .beam.offline { background: radial-gradient(circle, rgba(239,68,68,.75), rgba(239,68,68,.1) 70%, transparent 100%); }
    .agent-pixel {
      width: 64px;
      height: 64px;
      image-rendering: pixelated;
      z-index: 2;
      filter: drop-shadow(0 8px 0 rgba(0,0,0,0.24));
      object-fit: contain;
      transform-origin: center center;
    }
    .agent-pixel[data-pack="kenney"] {
      width: 72px;
      height: 72px;
      filter: drop-shadow(0 8px 0 rgba(0,0,0,0.32));
    }
    .role-chip, .tool-chip, .pose-chip, .event-chip, .object-chip {
      position: absolute;
      display: grid;
      place-items: center;
      border: 2px solid rgba(255,255,255,0.14);
      background: rgba(7, 13, 24, 0.92);
      box-shadow: 0 4px 0 rgba(0,0,0,0.24);
      color: #fff;
      z-index: 3;
    }
    .object-chip {
      left: 50%;
      bottom: 8px;
      width: 38px;
      height: 32px;
      border-radius: 10px;
      transform: translateX(-50%) translateY(5px) scale(.88);
      opacity: 0;
      font-size: 18px;
      border-color: rgba(110,231,249,0.3);
      background: rgba(3, 8, 16, 0.82);
      transition: opacity .18s ease, transform .18s ease;
      pointer-events: none;
    }
    .object-chip.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }
    .agent.at-interaction.pose-rest .agent-pixel {
      transform: translateY(6px) rotate(-8deg) scale(1.03);
    }
    .agent.at-interaction.pose-writing .agent-pixel,
    .agent.at-interaction.pose-terminal .agent-pixel {
      transform: translateY(2px) translateX(-5px) rotate(-2deg);
    }
    .agent.at-interaction.pose-planning .agent-pixel,
    .agent.at-interaction.pose-ponder .agent-pixel {
      transform: translateY(-6px);
    }
    .agent.at-interaction.pose-notes .agent-pixel {
      transform: translateX(-4px) rotate(-3deg);
    }
    .role-chip {
      left: 0;
      top: -4px;
      min-width: 24px;
      height: 20px;
      padding: 0 6px;
      border-radius: 999px;
      font-size: 8px;
    }
    .tool-chip {
      right: -4px;
      top: 20px;
      width: 26px;
      height: 26px;
      border-radius: 8px;
      font-size: 12px;
    }
    .pose-chip {
      left: 50%;
      top: -10px;
      width: 28px;
      height: 24px;
      border-radius: 999px;
      transform: translateX(-50%);
      font-size: 11px;
    }
    .event-chip {
      left: 50%;
      bottom: -8px;
      min-width: 58px;
      max-width: 104px;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      transform: translateX(-50%);
      font-size: 8px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity .18s ease, transform .18s ease;
      pointer-events: none;
    }
    .event-chip.show { opacity: 1; transform: translateX(-50%) translateY(-1px); }
    .event-chip.thinking { border-color: rgba(251,191,36,0.4); color: #fde68a; }
    .event-chip.planning { border-color: rgba(110,231,249,0.42); color: #cffafe; }
    .event-chip.working { border-color: rgba(74,222,128,0.42); color: #dcfce7; }
    .event-chip.offline { border-color: rgba(239,68,68,0.4); color: #fecaca; }
    .event-chip.idle { border-color: rgba(96,165,250,0.34); color: #dbeafe; }
    .agent-card {
      width: 120px;
      padding: 8px 8px 7px;
      border-radius: 10px;
      background: rgba(6, 11, 22, 0.86);
      border: 2px solid rgba(74, 116, 174, 0.85);
      box-shadow: 0 6px 0 rgba(0,0,0,0.22);
      display: grid;
      gap: 4px;
      text-align: center;
    }
    .agent-name {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      color: #fff;
    }
    .state-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--blue);
    }
    .state-dot.thinking { background: var(--yellow); box-shadow: 0 0 8px rgba(251,191,36,0.45); }
    .state-dot.planning { background: var(--cyan); box-shadow: 0 0 8px rgba(110,231,249,0.45); }
    .state-dot.working { background: var(--green); box-shadow: 0 0 8px rgba(74,222,128,0.45); }
    .state-dot.offline { background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,0.4); }
    .agent-meta, .agent-room {
      font-size: 9px;
      line-height: 1.45;
      color: var(--muted);
      min-height: 12px;
      overflow-wrap: anywhere;
    }
    body[data-locale="en-US"] .agent-meta,
    body[data-locale="en-US"] .agent-room { font-size: 7px; }

    .legend {
      position: absolute;
      left: 12px;
      bottom: 170px;
      width: 290px;
      padding: 12px 14px;
      z-index: 20;
      display: grid;
      gap: 8px;
    }
    .legend-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.5;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      margin-top: 2px;
      background: var(--blue);
      border: 2px solid rgba(255,255,255,0.14);
      flex: 0 0 auto;
    }
    .dot.thinking { background: var(--yellow); }
    .dot.planning { background: var(--cyan); }
    .dot.working { background: var(--green); }
    .dot.offline { background: var(--red); }

    .inspector {
      position: absolute;
      top: 110px;
      right: 12px;
      bottom: 170px;
      width: 340px;
      z-index: 22;
      padding: 14px;
      overflow: auto;
      display: grid;
      gap: 12px;
    }
    .inspector-card {
      padding: 12px;
      border-radius: 12px;
      background: var(--panel-soft);
      border: 2px solid var(--line-2);
      display: grid;
      gap: 10px;
    }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .pill {
      padding: 5px 8px;
      border-radius: 999px;
      border: 2px solid var(--line-2);
      background: rgba(7, 14, 26, 0.82);
      color: #eef6ff;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .stat {
      padding: 10px;
      border-radius: 10px;
      border: 2px solid var(--line-2);
      background: rgba(7,14,26,0.72);
      line-height: 1.55;
      overflow-wrap: anywhere;
    }
    .timeline-item {
      padding: 8px 0;
      border-bottom: 1px solid rgba(171,192,223,0.14);
      line-height: 1.55;
    }
    .timeline-item:last-child { border-bottom: 0; }
    .empty { color: var(--muted); }

    .events-belt {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      min-height: 118px;
      max-height: 128px;
      z-index: 24;
      padding: 12px 14px;
      display: grid;
      gap: 10px;
      overflow: hidden;
    }
    .belt-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      line-height: 1.5;
    }
    .events-track {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(220px, 1fr);
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .event-card {
      min-height: 88px;
      padding: 10px;
      border-radius: 12px;
      border: 2px solid rgba(74,116,174,0.82);
      background: rgba(7, 14, 26, 0.78);
      display: grid;
      gap: 6px;
    }
    .event-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .event-summary {
      line-height: 1.55;
      color: var(--muted);
      overflow-wrap: anywhere;
    }
    .dialog-backdrop {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(3, 8, 16, 0.36);
      z-index: 60;
    }
    .dialog-backdrop.show { display: flex; }
    .speech-dialog {
      width: min(420px, calc(100vw - 32px));
      padding: 14px;
      border-radius: 16px;
      border: 3px solid var(--line-2);
      background: rgba(7, 14, 26, 0.96);
      box-shadow: 0 16px 34px rgba(0,0,0,0.42);
      display: grid;
      gap: 10px;
    }
    .dialog-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(171,192,223,0.14);
      line-height: 1.5;
    }
    .dialog-row:last-child { border-bottom: 0; }

    @media (max-width: 1180px) {
      .brand { width: calc(100vw - 24px); }
      .summary-strip, .legend { display: none; }
      .inspector { top: 126px; width: 310px; }
    }
    @media (max-width: 920px) {
      .hud { inset: 10px 10px auto 10px; }
      .brand { width: calc(100vw - 20px); }
      .brand-top { flex-direction: column; }
      .top-tools { width: 100%; justify-content: space-between; }
      .inspector { left: 10px; right: 10px; width: auto; bottom: 170px; max-height: 35vh; }
      .events-belt { left: 10px; right: 10px; bottom: 10px; }
    }
  </style>
</head>
<body data-locale="zh-TW">
  <div class="app">
    <div class="world" id="world">
      <div class="camera-stage" id="camera-stage">
        <div class="house-shell">
          <div class="house-boundary"></div>
          <div class="house-corridor corridor-main"></div>
          <div class="house-corridor corridor-vertical corridor-a"></div>
          <div class="house-corridor corridor-vertical corridor-b"></div>
          <div class="house-corridor corridor-vertical corridor-c"></div>
          <div class="house-corridor corridor-vertical corridor-d"></div>
          <div class="house-corridor corridor-vertical corridor-e"></div>
          <div class="office-shell">
            <div class="window-strip"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="wing-marker left" id="core-wing-label">CORE WING</div>
            <div class="wing-marker right" id="clone-wing-label">CLONE WING</div>
            <div class="room-door" data-room="think_lab"></div>
            <div class="room-door" data-room="blueprint_lab"></div>
            <div class="room-door" data-room="tool_forge"></div>
            <div class="room-door" data-room="response_studio"></div>
            <div class="room-door" data-room="standby_dock"></div>
            <div class="room-door" data-room="clone_bay"></div>
            <div class="room-door" data-room="session_archive"></div>
          </div>
          <div class="district" data-room="think_lab"><div class="district-label"></div><div class="district-floor-accents"></div><div class="district-semantics"></div><div class="district-walls"></div><div class="district-props"></div></div>
          <div class="district" data-room="blueprint_lab"><div class="district-label"></div><div class="district-floor-accents"></div><div class="district-semantics"></div><div class="district-walls"></div><div class="district-props"></div></div>
          <div class="district" data-room="tool_forge"><div class="district-label"></div><div class="district-floor-accents"></div><div class="district-semantics"></div><div class="district-walls"></div><div class="district-props"></div></div>
          <div class="district" data-room="response_studio"><div class="district-label"></div><div class="district-floor-accents"></div><div class="district-semantics"></div><div class="district-walls"></div><div class="district-props"></div></div>
          <div class="district" data-room="standby_dock"><div class="district-label"></div><div class="district-floor-accents"></div><div class="district-semantics"></div><div class="district-walls"></div><div class="district-props"></div></div>
          <div class="district" data-room="clone_bay"><div class="district-label"></div><div class="district-floor-accents"></div><div class="district-semantics"></div><div class="district-walls"></div><div class="district-props"></div></div>
          <div class="district" data-room="session_archive"><div class="district-label"></div><div class="district-floor-accents"></div><div class="district-semantics"></div><div class="district-walls"></div><div class="district-props"></div></div>
          <svg class="path-layer" id="path-layer" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
          <div class="agents-layer" id="agents-layer"></div>
        </div>
      </div>
    </div>

    <div class="hud">
      <div class="brand panel" data-draggable-panel="brand">
        <div class="brand-top" data-drag-handle>
          <div>
            <div class="title" id="brand-title">Hermes Pixelverse</div>
            <div class="subtitle" id="brand-subtitle"></div>
          </div>
          <div class="top-tools">
            <div class="muted" id="last-sync"></div>
            <div class="panel lang-switch">
              <span class="muted" id="language-label"></span>
              <button type="button" data-locale-switch="zh-TW">繁中</button>
              <button type="button" data-locale-switch="en-US">EN</button>
            </div>
          </div>
        </div>
        <div class="subtitle" id="world-summary"></div>
      </div>
      <div class="summary-strip panel" data-draggable-panel="summary">
        <div class="subtitle" id="summary-title" data-drag-handle></div>
        <div class="summary-grid">
          <div class="summary-card"><span id="summary-world-label"></span><br><span class="strong" id="world-state"></span></div>
          <div class="summary-card"><span id="summary-agent-label"></span><br><span class="strong" id="agent-count">0</span></div>
          <div class="summary-card"><span id="summary-subagent-label"></span><br><span class="strong" id="subagent-count">0</span></div>
          <div class="summary-card"><span id="summary-session-label"></span><br><span class="strong" id="session-count">0</span></div>
        </div>
      </div>
    </div>

    <aside class="legend panel" data-draggable-panel="legend">
      <div class="subtitle" id="legend-title" data-drag-handle></div>
      <div class="legend-item"><span class="dot thinking"></span><div><strong id="legend-thinking-title"></strong><br><span class="muted" id="legend-thinking-body"></span></div></div>
      <div class="legend-item"><span class="dot planning"></span><div><strong id="legend-planning-title"></strong><br><span class="muted" id="legend-planning-body"></span></div></div>
      <div class="legend-item"><span class="dot working"></span><div><strong id="legend-working-title"></strong><br><span class="muted" id="legend-working-body"></span></div></div>
      <div class="legend-item"><span class="dot"></span><div><strong id="legend-idle-title"></strong><br><span class="muted" id="legend-idle-body"></span></div></div>
      <div class="legend-item"><span class="dot offline"></span><div><strong id="legend-offline-title"></strong><br><span class="muted" id="legend-offline-body"></span></div></div>
    </aside>

    <aside class="inspector panel" data-draggable-panel="inspector">
      <div class="inspector-card">
        <div class="subtitle" id="inspector-title" data-drag-handle></div>
        <div id="inspector-body" class="empty"></div>
      </div>
    </aside>

    <section class="events-belt panel" data-draggable-panel="events">
      <div class="belt-title" data-drag-handle>
        <span id="event-belt-title"></span>
        <span id="event-summary" class="muted"></span>
      </div>
      <div class="events-track" id="events"></div>
    </section>

    <div class="dialog-backdrop" id="speech-dialog-backdrop">
      <div class="speech-dialog" id="speech-dialog">
        <div class="strong" id="speech-dialog-title"></div>
        <div class="muted" id="speech-dialog-body"></div>
        <div id="speech-dialog-rows"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/app.mjs"></script>
</body>
</html>
